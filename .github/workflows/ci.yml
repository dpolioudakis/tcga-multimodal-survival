name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install numpy pandas scikit-learn lifelines xgboost pyarrow pytest
          pip install torch==2.2.2 --index-url https://download.pytorch.org/whl/cpu

      - name: Run tests
        run: make test
